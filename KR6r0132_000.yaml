front:
  text: 南嶽總勝集敘南嶽多古志率皆佚而不傳隋經籍志有宋居士撰衡山記太平御覽引徐靈期南嶽記宋藝文志有盧鴻衡山記錢景衎南嶽勝概諸書既不得見惟有唐道士李仲昭撰南嶽小録一卷録入四庫書此外有明彭簪衡嶽志國朝趙寧嶽麓志俱後出又少故實此本南嶽總勝集三卷為宋紹興時陳田夫所撰明人影宋鈔本體例既佳書亦最古考之朝公武讀書志有其書不著撰人名宋史藝文志并不載是書蓋其漏略吾友唐陶山明府仕優則學愛古敦素校付開雕閲月刊成甚可喜也昔向子禽遊五嶽待畢婚嫁豫以少賤從事畢督部幕府自華歷嵩又以都官扈蹕西巡經曲陽大茂山詢考北嶽舊廟故迹及官東魯祈雪泰山信宿日觀屈指五嶽已遊其四所未至者南嶽耳而陶山先生未第時以名孝廉遊學足迹半天下授經泰山之麓撰岱覽三十卷搜羅古迹金石多前人未見茲官東南以經術飾吏治方求吳地記吳中水利書寫刊以徵一方文獻尤念此書為鄉郡名山故迹所在急為廣布豫與陶山生同歲甫及知非鬢髮漸斑白矣薄宦思有濟於物終不能自行意如待畢婚嫁遊名山恐年衰已乏濟勝之具終日執此編尋攬名勝以當臥遊或數年後即賦遂初從陶山於瀟湘雲夢間望衡九面以補向禽未遂之願則與陶山案圖考古續補此書所不及載又盛舉也嘉慶六年六月朔日孫星衍敘於金陵五松書屋南嶽總勝集卷上溪山之勝林壑之美人所同好也而於幽人野士常獨親焉必志不拘於利欲形不膠於城市養心於清靜養氣於淡泊養視聽於寂寞然後山林之觀得其真趣閬中道人陳耕叟有焉庵居南嶽紫蓋峯下往來七十二峯之間三十餘年心有所慕不倦求訪前古異人高僧嵒居穴處靈蹤祕迹考其事而紀之所歷滋多所獲亦廣遂積而成編名曰總勝集凡嶽山之邃隱與夫觀寺之始末古今之題詠有關於勝趣者靡不畢録或謂為道者修練之要察玄牝觀鼻機亦暇此耶則將應之曰雖然是編之作非特資於好事者尋幽討勝一時登覽之興固有素懷淨緣默存真趣按集迹事感今懷昔一旦契其夙心發其雅志悟修真之至理躅前人之超然仰山景行魚筌兔蹄有在於是則於是編之作庶幾為知者有取也隆興甲申上巳日拙叟序南嶽總勝集總序衡嶽之記有尋勝證勝大小二録勝概集衡山記皆近代好事者編集疏略何多並各執於一隅不能廣其登覽故僧作尋勝則道家之事削而不言道作證勝則僧舍之境闕而不書不惟不究二教之始終抑亦蔽諸峯之殊異至於監嶽廟事楊臨縣尉錢景衎雖併而録之其中勝概瓌奇靈蹤昭著百得三五而已愚因圃暇合前四記廣為修之刪其重復補其闕略寥寥空山綽有年歲漫峯跨谷未始云勞探勝尋真頓覺志倦搜求內教博採仙經并討舊記斷自三皇已來迄於我宋約數千萬載之間得道真仙凡經涉於南嶽者必為之纂録敷至四五萬言分為上中下卷不問觀寺皆考廢興且嶽廟者周秦以前祠在祝融之上禮秩比三公漢唐封以王爵今廟佐鍊玉峯下又按衡嶽觀宇洎真仙得道者據前四記並云起於晉太康中為始則是晉之已前未有宮祠蓋可知矣又詳按黃帝內傳云與西王母於宮中別營仙館又於華山嵩山王屋山泰山衡山終南山及諸洞天皆造王母觀以候神也以今考之蓋緣湮沒既久了無遺迹豈有國家壽山係第三洞天中有四福地上歷千古至晉方建宮觀乎必不然也即今華山南下有古王母觀至今世度女真焚修不輟可以為證則內傳之言果不妄矣又夏禹王於衡山致齋建清泠宮以安奉虞舜之像即知漢秦以前至於上古建立宮祠逮真仙棲遊者不減於晉唐故舉一二為標題爾今則上敘峯巒靈迹嶽祠次之洎歷代帝王傳經受道中敘觀寺興廢兼得道異人高僧嶽中所産靈異下敘唐宋得道異人高僧洎隱逸敘古跋記前後第而踵之年數相參班班可採尋幽賞勝之士為之司南可乎隆興改元重九日九真洞老圃菴蒼野子陳田夫耕叟
